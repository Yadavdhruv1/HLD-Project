# General Server Configurations
server.port=8080

# Spring DataSource (H2 In-Memory DB by default for zero-config easy local setup)
spring.datasource.url=jdbc:h2:mem:typeahead;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# JPA & Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console Enabled for easy debugging
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Micrometer Actuator Endpoints exposure
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Custom settings
trending.decay.lambda=0.0001
spring.main.banner-mode=off
logging.level.com.typeahead=INFO
